<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For thangoo 💋🖤💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* 🌈 Animated Background */
.crt{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(-45deg, #ff4e8a, #ff9a9e, #fad0c4, #ffdde1);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* 💘 Hearts */
.hearts::before,
.hearts::after{
    content:"";
    position:absolute;
    width:100%;
    text-align:center;
    font-size:22px;
    animation: floatHearts 8s linear infinite;
}
.hearts::after{ animation-delay:4s; }

@keyframes floatHearts{
    0%{ transform: translateY(100vh); opacity:0; }
    20%{opacity:1;}
    100%{ transform: translateY(-10vh); opacity:0; }
}

/* Card */
.card{
    background:#fff0f6;
    padding:26px;
    border-radius:22px;
    text-align:center;
    width:92%;
    max-width:360px;
    box-shadow:0 0 25px rgba(255,0,120,.6), 0 15px 40px rgba(0,0,0,.25);
    z-index:2;
}
h1{color:#e91e63}
p{color:#555;font-size:18px}

.buttons{
    margin-top:25px;
    height:130px;
    position:relative;
}
button{
    padding:12px 26px;
    font-size:16px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    position:absolute;
}
#yesBtn{
    background:#e91e63;
    color:white;
    left:50%;
    transform:translateX(-120%);
}
#noBtn{
    background:#ffc1d9;
    left:50%;
    transform:translateX(10%);
}

/* Typing */
.typing{
    white-space:pre-line;
    font-size:17px;
    line-height:1.6;
    min-height:150px;
}

/* Photo */
.photo{
    width:100%;
    height:280px;
    object-fit:cover;
    object-position:center;
    border-radius:18px;
    margin-top:15px;
}

/* Ring */
.ring{
    font-size:46px;
    margin:12px 0;
    animation:ringPulse 1.5s infinite;
}
@keyframes ringPulse{50%{transform:scale(1.25)}}

/* Fireworks */
canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="crt">
<div class="hearts"></div>

<!-- ✅ SONG UPDATED HERE -->
<audio id="music" preload="auto">
    <source src="song.mp3" type="audio/mpeg">
</audio>

<canvas id="fireworks"></canvas>

<div class="card" id="card">
    <h1>thangoo 💋🖤</h1>
    <p>Happy Anniversary thangooo!</p>
    <div class="buttons">
        <button id="yesBtn">YES 💕</button>
        <button id="noBtn">NO 🙈</button>
    </div>
</div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const card = document.getElementById("card");
const music = document.getElementById("music");
const buttonsBox = document.querySelector(".buttons");

/* NO button escape */
function teleport(){
    const maxX = buttonsBox.clientWidth - noBtn.offsetWidth;
    const maxY = buttonsBox.clientHeight - noBtn.offsetHeight;
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top  = Math.random() * maxY + "px";
}
noBtn.addEventListener("mouseenter", teleport);
noBtn.addEventListener("click", teleport);

/* Music */
function playMusic(){
    music.volume = 0;
    music.loop = true;
    music.play().then(()=>{
        const fade = setInterval(()=>{
            if(music.volume < 0.9) music.volume += 0.02;
            else clearInterval(fade);
        },150);
    });
}

/* YES click */
yesBtn.onclick = ()=>{
    playMusic();
    card.innerHTML = `
        <h1>I knew it 💖</h1>
        <div class="ring">💍</div>
        <div class="typing" id="typing"></div>
        <img id="finalPhoto" class="photo" style="display:none"
             src="divya%20anniversary%20photo.jpg">
    `;
    typeText();
    startFireworks();
};

/* Typing */
const text = `HAPPY ANNIVERSARY thangoooo 🌹

From the moment you came into my life,
everything felt softer… warmer… better.

Every smile of yours feels like home.
Every moment with you is precious.

I choose you.
Today. Tomorrow. Always. ❤️`;

function typeText(){
    const el = document.getElementById("typing");
    const photo = document.getElementById("finalPhoto");
    let i = 0;

    const t = setInterval(()=>{
        el.textContent += text[i++];

        if(i >= text.length){
            clearInterval(t);

            setTimeout(()=>{
                photo.style.display = "block";
            }, 800);
        }
    },35);
}

/* Fireworks */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;
let particles = [];

function startFireworks(){
    setInterval(()=>{
        for(let i=0;i<60;i++){
            particles.push({
                x:Math.random()*canvas.width,
                y:Math.random()*canvas.height/2,
                dx:(Math.random()-.5)*5,
                dy:(Math.random()-.5)*5,
                life:70
            });
        }
    },900);
    animate();
}
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach((p,i)=>{
        ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
        p.x+=p.dx; p.y+=p.dy; p.life--;
        if(p.life<=0) particles.splice(i,1);
    });
    requestAnimationFrame(animate);
}
</script>

</body>
</html>
